:root{

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--tx);font-family:'Noto Sans KR',sans-serif;}
body{padding-bottom:calc(env(safe-area-inset-bottom)+40px);}
.app{max-width:520px;margin:0 auto;padding:0 16px 100px;}
.hdr{display:flex;align-items:flex-end;justify-content:space-between;padding:24px 0 16px;border-bottom:.5px solid var(--bd2);}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--ac);letter-spacing:.2em;}
.hdr p{font-size:10px;color:var(--tx3);letter-spacing:.15em;margin-top:3px;}
.badge{font-size:13px;padding:6px 14px;border:.5px solid var(--bd3);border-radius:20px;color:var(--tx3);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);display:inline-block;margin-right:6px;animation:pulse 2s infinite;}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.cat-btn{padding:14px 8px;background:var(--bg2);border:.5px solid var(--bd);border-radius:12px;color:var(--tx3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center;line-height:1.3;transition:all .15s;}

.menu-area{min-height:100px;}
.cat-sub{font-size:11px;color:var(--tx3);margin-bottom:10px;}
.mi{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg2);border:.5px solid var(--bd);border-radius:14px;margin-bottom:8px;gap:10px;transition:all .15s;}
.mi.on{background:var(--bg3);border-color:var(--bd3);}
.mi-info{flex:1;min-width:0;}
.mi-name{font-size:15px;color:var(--tx);line-height:1.4;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.mi-note{font-size:11px;color:var(--tx3);margin-top:3px;}
.mi-price{font-size:14px;color:var(--tx2);margin-top:4px;font-weight:500;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;flex-shrink:0;}
.tb{background:rgba(210,110,110,.15);color:var(--red);}

.tf{background:rgba(110,190,110,.12);color:var(--gr);}
.ta{background:rgba(210,110,170,.12);color:var(--pk);}

.act{display:flex;gap:10px;margin-top:14px;}

    {id:'w7',n:'무초마스 화이트',p:36000,t:'',nt:'스페인'},{id:'w8',n:'또스띠 핑크 모스까또',p:45000,t:'',nt:'스파클링·이탈리아'},
  ]},
];

let sel=null,qty={},setO=[],orders=[],curCat=0;
MENUS.forEach(c=>c.items.forEach(m=>qty[m.id]=0));
const all=()=>MENUS.flatMap(c=>c.items);
const fi=id=>all().find(m=>m.id===id);

// 실시간 동기화
onValue(ordersRef,(snapshot)=>{
  orders=[];
  if(snapshot.exists()){
    orders=Object.entries(snapshot.val())
      .map(([key,val])=>({...val,_key:key}))
      .sort((a,b)=>b.id-a.id);
  }
  document.getElementById('badge').innerHTML=`<span class="sync-dot"></span>${orders.length}건`;
  renderLog();
});

async function saveOrder(o){ await push(ordersRef,o); }
async function deleteOrder(key){ await remove(ref(db,'orders/'+key)); }
async function deleteAllOrders(){ await remove(ordersRef); }

function calcB(){
  let sl=qty[STEAK_ID]||0;
  if(!sl)return{bundles:[],steakLeft:0};
  const prl={};BUNDLE_IDS.forEach(id=>{if(qty[id]>0)prl[id]=qty[id];});
  const bundles=[];
  for(const id of BUNDLE_IDS){
    if(!prl[id])continue;
    while(sl>0&&prl[id]>0){bundles.push({choice:fi(id).n,id});sl--;prl[id]--;}
    if(!sl)break;
  }
  return{bundles,steakLeft:sl};
}

function buildCatGrid(){
  document.getElementById('cat-grid').innerHTML=MENUS.map((c,i)=>`<button class="cat-btn${i===curCat?' on':''}" onclick="selectCat(${i})">${c.cat}</button>`).join('');
  renderMenuArea();
}
window.selectCat=function(i){
  curCat=i;
  document.querySelectorAll('.cat-btn').forEach((b,j)=>b.className='cat-btn'+(j===i?' on':''));
  renderMenuArea();
};
function renderMenuArea(){
  const tL={b:'BEST',l:'한정',f:'무료',a:'에이드',s:'사이드',set:'세트'};
  const tC={b:'tb',l:'tl',f:'tf',a:'ta',s:'ts',set:'tset'};
  const c=MENUS[curCat];
  let html='';
  if(c.sub)html+=`<div class="cat-sub">${c.sub}</div>`;
  c.items.forEach(m=>{
    const pd=m.t==='f'?'<span class="tag tf">무료</span>':m.t==='a'?`<span style="color:var(--pk);font-size:13px;">+3,500원</span>`:m.p.toLocaleString()+'원';
    const th=m.t&&tC[m.t]?`<span class="tag ${tC[m.t]}">${tL[m.t]}</span>`:'';
    if(m.id==='s2'){
      html+=`<div class="mi" id="mi-s2"><div class="mi-info"><div class="mi-name">${m.n}<span class="tag tset">세트</span></div><div class="mi-note">${m.nt||''}</div><div class="mi-price">${pd} 고정</div></div><button class="set-btn" onclick="openSet()">+ 추가</button></div><div id="slc"></div>`;
    } else {
      html+=`<div class="mi${qty[m.id]>0?' on':''}" id="mi-${m.id}"><div class="mi-info"><div class="mi-name">${m.n}${th}</div>${m.nt?`<div class="mi-note">${m.nt}</div>`:''}<div class="mi-price">${pd}</div></div><div class="qc"><button class="qb" onclick="cq('${m.id}',-1)">−</button><span class="qn" id="q-${m.id}">${qty[m.id]}</span><button class="qb" onclick="cq('${m.id}',1)">+</button></div></div>`;
    }
  });
  document.getElementById('menu-area').innerHTML=html;
  renderSetList();
}

window.openTbl=function(){
  let h=`<div class="mover" onclick="closeM(event)"><div class="mbox" onclick="event.stopPropagation()"><div class="mtit">테이블 선택</div><div class="mdesc">번호를 선택하세요</div><div class="tgrid">`;
  for(let i=1;i<=30;i++)h+=`<button class="tgb${sel===i?' on':''}" onclick="pickT(${i})">${i}</button>`;
  h+=`</div><button class="mcls" onclick="closeM()">취소</button></div></div>`;
  document.getElementById('mroot').innerHTML=h;
};
window.pickT=function(n){sel=n;document.getElementById('tbl-cur').textContent=n+'번 테이블';document.getElementById('tbl-btn').className='tbl-btn on';closeM();};
window.openSet=function(){
  const ro=o=>`<button class="mopt" onclick="addSet('${o.n}')"><span>${o.n}</span><span class="mopt-p">${o.p.toLocaleString()}원</span></button>`;
  document.getElementById('mroot').innerHTML=`<div class="mover" onclick="closeM(event)"><div class="mbox" onclick="event.stopPropagation()"><div class="mtit">큐브스테이크 세트</div><div class="mdesc">파스타 또는 리소토 선택 — 59,000원 고정</div><div class="msec">파스타</div>${PASTA_O.map(ro).join('')}<div class="msec">리소토</div>${RISO_O.map(ro).join('')}<button class="mcls" onclick="closeM()">취소</button></div></div>`;
};
window.addSet=function(n){setO.push({n});closeM();renderSetList();updSumm();};
window.removeSet=function(i){setO.splice(i,1);renderSetList();updSumm();};
function renderSetList(){
  const e=document.getElementById('slc');if(!e)return;
  e.innerHTML=setO.length?`<div class="slc-wrap">${setO.map((s,i)=>`<div class="sl-row"><span>· ${s.n}</span><button class="sl-rm" onclick="removeSet(${i})">×</button></div>`).join('')}</div>`:'';
}
function closeM(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('mroot').innerHTML='';}
window.closeM=closeM;

window.cq=function(id,d){
  qty[id]=Math.max(0,qty[id]+d);
  const n=document.getElementById('q-'+id);if(n)n.textContent=qty[id];
  const e=document.getElementById('mi-'+id);if(e)e.className='mi'+(qty[id]>0?' on':'');
  updSumm();
};

function updSumm(){
  const{bundles,steakLeft}=calcB();
  const bundleSet=new Set([...BUNDLE_IDS,STEAK_ID]);
  const others=all().filter(m=>qty[m.id]>0&&!bundleSet.has(m.id));
  let tot=bundles.length*SET_P+setO.length*SET_P;
  if(steakLeft)tot+=STEAK_P*steakLeft;
  BUNDLE_IDS.forEach(id=>{if(qty[id]>0){const bundled=bundles.filter(b=>b.id===id).length;const rem=qty[id]-bundled;if(rem>0)tot+=fi(id).p*rem;}});
  tot+=others.reduce((s,m)=>s+m.p*qty[m.id],0);
  const se=document.getElementById('summ');
  const has=Object.values(qty).some(v=>v>0)||setO.length>0;
  if(!has){se.style.display='none';return;}
  se.style.display='block';
  let rows='';
  bundles.forEach(b=>rows+=`<div class="sr hi"><span>큐브세트 (${b.choice})</span><span>${SET_P.toLocaleString()}원</span></div>`);
  setO.forEach(s=>rows+=`<div class="sr"><span>큐브세트 (${s.n})</span><span>${SET_P.toLocaleString()}원</span></div>`);
  if(steakLeft)rows+=`<div class="sr"><span>와규 큐브 스테이크 × ${steakLeft}</span><span>${(STEAK_P*steakLeft).toLocaleString()}원</span></div>`;
  BUNDLE_IDS.forEach(id=>{if(qty[id]>0){const bundled=bundles.filter(b=>b.id===id).length;const rem=qty[id]-bundled;if(rem>0){const m=fi(id);rows+=`<div class="sr"><span>${m.n} × ${rem}</span><span>${(m.p*rem).toLocaleString()}원</span></div>`;}}});
  others.forEach(m=>{const c=m.p*qty[m.id];rows+=`<div class="sr"><span>${m.n} × ${qty[m.id]}</span><span>${m.t==='f'?'무료':c.toLocaleString()+'원'}</span></div>`;});
  document.getElementById('summ-rows').innerHTML=rows;
  document.getElementById('stot').textContent=tot.toLocaleString()+'원';
}

window.confirmOrder=async function(){
  if(!sel){alert('테이블을 선택해 주세요.');return;}
  const has=Object.values(qty).some(v=>v>0)||setO.length>0;
  if(!has){alert('메뉴를 선택해 주세요.');return;}
  const{bundles,steakLeft}=calcB();
  const bundleSet=new Set([...BUNDLE_IDS,STEAK_ID]);
  const others=all().filter(m=>qty[m.id]>0&&!bundleSet.has(m.id));
  const memo=document.getElementById('memo').value;
  let tot=bundles.length*SET_P+setO.length*SET_P;
  if(steakLeft)tot+=STEAK_P*steakLeft;
  BUNDLE_IDS.forEach(id=>{if(qty[id]>0){const bundled=bundles.filter(b=>b.id===id).length;const rem=qty[id]-bundled;if(rem>0)tot+=fi(id).p*rem;}});
  tot+=others.reduce((s,m)=>s+m.p*qty[m.id],0);
  const ia=[];
  bundles.forEach(b=>ia.push({n:'큐브세트 ('+b.choice+')',q:1,up:SET_P,fr:false}));
  setO.forEach(s=>ia.push({n:'큐브세트 ('+s.n+')',q:1,up:SET_P,fr:false}));
  if(steakLeft)ia.push({n:'와규 큐브 스테이크',q:steakLeft,up:STEAK_P,fr:false});
  BUNDLE_IDS.forEach(id=>{if(qty[id]>0){const bundled=bundles.filter(b=>b.id===id).length;const rem=qty[id]-bundled;if(rem>0){const m=fi(id);ia.push({n:m.n,q:rem,up:m.p,fr:false});}}});
  others.forEach(m=>ia.push({n:m.n,q:qty[m.id],up:m.p,fr:m.t==='f'}));
  const now=new Date();
  const ti=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  await saveOrder({id:Date.now(),table:sel,items:ia,memo,total:tot,time:ti});
  resetOrder();
};

function renderLog(){
  const e=document.getElementById('log-list');
  if(!orders.length){e.innerHTML='<div class="emp">주문이 없습니다</div>';return;}
  e.innerHTML=orders.map((o,i)=>`
    <div class="oc" onclick="openDet(${i})">
      <div class="oh">
        <span class="ot">${o.table}번 테이블</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="oti">${o.time}</span>
          <button class="del-btn" onclick="event.stopPropagation();delOne('${o._key}')">삭제</button>
        </div>
      </div>
      <div class="oi">${o.items.map(x=>x.n+' × '+x.q).join('<br>')}</div>
      <div class="op">${o.total.toLocaleString()}원</div>
    </div>`).join('');
}

window.delOne=async function(key){
  if(confirm('이 주문을 삭제할까요?')){await deleteOrder(key);}
};

window.openDet=function(i){
  const o=orders[i];
  document.getElementById('mroot').innerHTML=`
    <div class="mover" onclick="closeM(event)">
      <div class="dbox" onclick="event.stopPropagation()">
        <div class="dt">${o.table}번 테이블</div>
        <div class="dti">${o.time}</div>
        <div class="ditems">
          ${o.items.map(x=>`<div class="dirow"><span class="diname">${x.n} × ${x.q}</span><span class="diprice">${x.fr?'무료':(x.up*x.q).toLocaleString()+'원'}</span></div>`).join('')}
        </div>
        ${o.memo?`<div class="dmemo">📝 ${o.memo}</div>`:''}
        <div class="dtrow"><span class="dtlbl">TOTAL</span><span class="dtval">${o.total.toLocaleString()}원</span></div>
        <div class="d-act">
          <button class="ddel" onclick="delOne('${o._key}');closeM()">삭제</button>
          <button class="dcls" onclick="closeM()">닫기</button>
        </div>
      </div>
    </div>`;
};

window.clearOrders=async function(){
  if(!orders.length)return;
  if(confirm('주문 내역을 전부 삭제할까요?')){await deleteAllOrders();}
};

window.resetOrder=function(){
  all().forEach(m=>{qty[m.id]=0;});
  setO=[];sel=null;
  document.getElementById('tbl-cur').textContent='테이블 선택';
  document.getElementById('tbl-btn').className='tbl-btn';
  document.getElementById('memo').value='';
  buildCatGrid();updSumm();
};

buildCatGrid();
</script>
</body>
</html>
